---
services:
  db-postgres:
    image: postgres:18-alpine
    container_name: db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whoa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whoa}
      POSTGRES_DB: ${POSTGRES_DB:-link_whoa}
    ports:
      - "5444:5432"
    volumes:
      - db-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        reservations:
          cpus: 0.25
          memory: 128M
        limits:
          cpus: 1
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whoa}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2s
      start_interval: 2s

volumes:
  db-postgres-data:
    driver: local
