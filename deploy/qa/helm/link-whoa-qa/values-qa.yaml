# QA Environment values for link-whoa-qa
replicaCount: 2

image:
  repository: ghcr.io/ohbus/link-whoa
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8844

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: qa.link.whoa.sh
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: link-whoa-qa-tls
      hosts:
        - qa.link.whoa.sh

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# Canary Strategy Config
rollout:
  enabled: true
  canary:
    steps:
      - setWeight: 4
      - pause: {} # Pause indefinitely until manually promoted in ArgoCD/CLI
      - setWeight: 20
      - pause: { duration: 5m }
      - setWeight: 50
      - pause: { duration: 5m }

config:
  springProfilesActive: "prod" # Using prod profile for env var injection
  database:
    host: "qa-db-host.db.ondigitalocean.com"
    port: "25060"
    name: "link_whoa_qa"
    user: "whoa_qa"
