apiVersion: v1
kind: Secret
metadata:
  name: {{ include "link-whoa-qa.fullname" . }}-secret-qa
  labels:
    {{- include "link-whoa-qa.labels" . | nindent 4 }}
type: Opaque
data:
  DB_USER: {{ .Values.config.database.user | b64enc | quote }}
  # Password should be provided during deployment (e.g. via --set or ArgoCD)
  DB_PASSWORD: {{ .Values.config.database.password | default "change-me" | b64enc | quote }}
