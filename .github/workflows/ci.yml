name: CI Master

on:
  push:
    branches: [ "master" ]

jobs:
  backend-lint:
    name: "Backend: Lint (ktlint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - name: Check Style
        run: ./gradlew ktlintCheck

  backend-tests:
    name: "Backend: Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - name: Run All Backend Tests
        run: ./gradlew test

  frontend-unit-tests:
    name: "Frontend: Unit Tests (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ./ui
        run: npm ci --ignore-scripts
      - name: Run Vitest
        working-directory: ./ui
        run: npm test -- --watch=false

  e2e-tests:
    name: "E2E: Playwright Lifecycle Suite"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install Frontend Deps
        working-directory: ./ui
        run: npm ci --ignore-scripts
      - name: Install Playwright Browsers
        working-directory: ./ui
        run: npx playwright install --with-deps chromium
      
      - name: Start Backend in Background
        run: ./gradlew bootRun &
        env:
          SPRING_PROFILES_ACTIVE: dev
      
      - name: Wait for Backend
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:8844/actuator/health | grep UP; do sleep 2; done'
      
      - name: Run Playwright
        working-directory: ./ui
        run: npm run e2e

  build-and-push:
    name: "Release: Docker & Sonar"
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      
      - name: Build and analyze
        run: ./gradlew build sonar --info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/test/TEST-*.xml'
          require_tests: true
          annotate_notice: false
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
