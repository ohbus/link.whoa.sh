name: PR Validation

on:
  pull_request:
    branches: [ "master" ]

jobs:
  backend-lint:
    name: "Backend: Lint (ktlint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - name: Check Style
        run: ./gradlew ktlintCheck

  backend-tests:
    name: "Backend: Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - name: Run All Backend Tests
        run: ./gradlew test

  frontend-unit-tests:
    name: "Frontend: Unit Tests (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        working-directory: ./ui
        run: npm ci --ignore-scripts
      - name: Run Vitest
        working-directory: ./ui
        run: npm test -- --watch=false

  e2e-tests:
    name: "E2E: Playwright Lifecycle Suite"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install Frontend Deps
        working-directory: ./ui
        run: npm ci --ignore-scripts
      - name: Install Playwright Browsers
        working-directory: ./ui
        run: npx playwright install --with-deps chromium
      
      - name: Start Backend in Background
        run: ./gradlew bootRun &
        env:
          SPRING_PROFILES_ACTIVE: dev
      
      - name: Wait for Backend
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:8844/actuator/health | grep UP; do sleep 2; done'
      
      - name: Run Playwright
        working-directory: ./ui
        run: npm run e2e
      
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 30
