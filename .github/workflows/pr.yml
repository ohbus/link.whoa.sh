name: PR Validation

on:
  pull_request:
    branches: [ "master" ]

jobs:
  backend-checks:
    name: "Backend: Lint & Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: link_whoa
          POSTGRES_USER: whoa
          POSTGRES_PASSWORD: whoa
        ports:
          - 5444:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      
      - name: Lint & Test
        run: ./gradlew ktlintCheck test
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 7
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

  frontend-checks:
    name: "Frontend: Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ./ui
        run: npm ci --ignore-scripts
      
      - name: Run Vitest
        working-directory: ./ui
        run: npm run test:ci
      
      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-unit-results
          path: ui/test-results/junit.xml
          retention-days: 7
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: ui/coverage/
          retention-days: 7

  e2e-checks:
    name: "E2E: Playwright Suite"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-checks, frontend-checks]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: link_whoa
          POSTGRES_USER: whoa
          POSTGRES_PASSWORD: whoa
        ports:
          - 5444:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      
      - name: Install Frontend Deps
        working-directory: ./ui
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: ./ui
        run: npx playwright install chromium --with-deps

      - name: Install Playwright System Deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        working-directory: ./ui
        run: npx playwright install-deps chromium
      
      - name: Pre-build Backend
        run: ./gradlew build -x test
      
      - name: Start Backend
        run: |
          nohup ./gradlew bootRun --args='--spring.profiles.active=dev' > backend.log 2>&1 &
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: 127.0.0.1
      
      - name: Wait for Backend
        run: |
          for i in {1..24}; do
            if curl -s http://127.0.0.1:8844/actuator/health | grep UP; then
              echo "Backend is UP"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 5
          done
          echo "Backend failed to start"
          cat backend.log
          exit 1
      
      - name: Run Playwright
        working-directory: ./ui
        run: npx playwright test --reporter=list
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: 127.0.0.1
      
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 30
      
      - name: Show Backend Log on Failure
        if: failure()
        run: cat backend.log
